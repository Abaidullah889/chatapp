apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chatapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chatapp
      labels:
        app: backend
    spec:
      containers:
        - name: chatapp-backend
          # ECR image — ${IMAGE_TAG} is replaced by envsubst in CI/CD with the commit SHA
          image: 071179620185.dkr.ecr.us-east-1.amazonaws.com/chatapp-backend:${IMAGE_TAG}
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5001"
            # Kubernetes interpolates $(VAR) from other env entries in the same container
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mongo-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mongo-password
            - name: MONGODB_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb:27017/chatApp?authSource=admin"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: jwt
            # Leave empty to reflect the caller's origin (required for withCredentials).
            # Set to the frontend LoadBalancer URL to restrict after first deploy.
            - name: CORS_ORIGIN
              value: ""
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
