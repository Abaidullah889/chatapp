apiVersion: v1
kind: Secret
metadata:
  name: secrets
  namespace: chatapp
type: Opaque
# stringData accepts plain text — Kubernetes base64-encodes it automatically.
# CI/CD runs: envsubst < k8s/secrets.yml | kubectl apply -f -
# so ${VAR} placeholders are filled from GitHub Actions secrets before apply.
stringData:
  jwt: "${JWT_SECRET}"
  mongo-username: "${MONGO_USERNAME}"
  mongo-password: "${MONGO_PASSWORD}"
